services:
  postgres:
    container_name: postgres-news
    image: postgres:15
    ports:
      - "6666:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clevertec
    networks:
      - my_network
  news:
    container_name: news-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8082
      server_port: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clevertec
      APPLICATION_SERVICE_URL: comment:8085/clevertec
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    networks:
      - my_network
networks:
  my_network:
    driver: bridge
    external: true