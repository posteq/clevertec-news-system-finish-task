services:
  postgres-comment:
    container_name: postgres-comment
    image: postgres:15
    ports:
      - "5555:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clevertec
    networks:
      - my_network
  comment:
    container_name: comment-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8085
      server_port: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-news:5432/clevertec
    ports:
      - "8085:8085"
    depends_on:
      - postgres-comment
    networks:
      - my_network
networks:
  my_network:
    driver: bridge
    external: true